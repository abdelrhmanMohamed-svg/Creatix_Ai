name: creatix
description: "Creatix - A Flutter application with Clean Architecture"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_bloc: ^9.0.0
  get_it: ^8.0.3
  supabase_flutter: ^2.0.0
  equatable: ^2.0.7
  dartz: ^0.10.1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - .env.local